name: Warm cache after deploy

on:
  deployment_status:

jobs:
  warm:
    # Run when Vercel marks any deployment as successful
    # (always warms the production URL regardless of which deployment triggered it)
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Prime KV cache
        run: |
          echo "Warming cache at https://jobs.companyon.vc/api/jobs ..."
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://jobs.companyon.vc/api/jobs)
          echo "Response status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "Cache warmed successfully."
          else
            echo "Warning: unexpected status $STATUS" >&2
            exit 1
          fi
