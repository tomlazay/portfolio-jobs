<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ── Primary SEO ───────────────────────────────────────── -->
  <!-- SEO: title / description are the static defaults for crawlers and social cards.
       Set siteTitle / heroHeadline / heroSubtext in your Google Sheet config tab
       to override the runtime display text (title tag must be updated here). -->
  <title>Portfolio Careers | Companyon Ventures</title>
  <meta name="description" content="Explore open roles across Companyon Ventures' portfolio companies. Find your next opportunity in B2B software.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://jobs.companyon.vc">

  <!-- ── Open Graph (LinkedIn, Facebook, Slack, iMessage…) ── -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://jobs.companyon.vc">
  <meta property="og:site_name"   content="Companyon Ventures">
  <meta property="og:title"       content="Portfolio Careers | Companyon Ventures">
  <meta property="og:description" content="Explore open roles across Companyon Ventures' portfolio companies. Find your next opportunity in B2B software.">
  <meta property="og:image"       content="https://jobs.companyon.vc/og-image.png">
  <meta property="og:image:width"  content="1200">
  <meta property="og:image:height" content="630">

  <!-- ── X / Twitter Card ─────────────────────────────────── -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:site"        content="@companyonvc">
  <meta name="twitter:title"       content="Portfolio Careers | Companyon Ventures">
  <meta name="twitter:description" content="Explore open roles across Companyon Ventures' portfolio companies. Find your next opportunity in B2B software.">
  <meta name="twitter:image"       content="https://jobs.companyon.vc/og-image.png">

  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-brand">
    <!-- Logo:
         The filename must also be updated in any og:image / twitter:image meta tags above. -->
    <img src="logo.svg" alt="Companyon Ventures" class="hero-logo">
  </div>
  <!-- FORK: update hero text below, or set "heroHeadline" / "heroSubtext" in your Google Sheet config tab
       to override these at runtime without editing code. -->
  <h1 id="hero-headline">Jobs in Our <span>Portfolio</span></h1>
  <p id="hero-subtext">Explore open roles across our portfolio companies</p>
  <div class="hero-stats">
    <div class="hero-stat">
      <div class="hero-stat-num" id="company-count">—</div>
      <div class="hero-stat-label">Companies</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-num" id="total-count">—</div>
      <div class="hero-stat-label">Open Roles</div>
    </div>
  </div>
</div>

<!-- SEARCH & FILTERS -->
<div class="controls">
  <div class="search-bar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="search-input" placeholder="Search by job title, company, or keyword…">
    <span class="search-count" id="search-count"></span>
  </div>
  <div class="filters">
    <select class="filter-select" id="filter-company">
      <option value="">All Companies</option>
    </select>
    <select class="filter-select" id="filter-dept">
      <option value="">All Departments</option>
    </select>
    <select class="filter-select" id="filter-location">
      <option value="">All Locations</option>
    </select>
    <select class="filter-select" id="filter-type">
      <option value="">All Types</option>
    </select>
    <button class="clear-btn" onclick="clearFilters()">Clear filters</button>
  </div>
</div>

<!-- JOB LIST -->
<div class="main">
  <div class="results-header">
    <span class="results-label">Showing <strong id="visible-count">—</strong> open positions</span>
  </div>

  <!-- Loading state -->
  <div class="loading-state" id="loading-state">
    <div class="loading-spinner"></div>
    <span>Loading latest jobs…</span>
  </div>

  <div class="jobs-list" id="jobs-list"></div>

  <div class="no-results" id="no-results" style="display:none">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    No jobs match your search. Try adjusting your filters.
  </div>
</div>

<!-- FOOTER -->
<footer class="site-footer">
  <div class="site-footer-inner">
    <!-- FORK: update this copyright line, or set "footerText" in your Google Sheet config tab
         to override it at runtime without editing code. -->
    <span class="footer-copy" id="footer-copy">© 2026 Companyon Ventures</span>
    <span class="footer-divider">·</span>
    <span class="footer-updated">Last Updated: <span id="last-updated">—</span></span>
    <span class="footer-divider">·</span>
    <!-- FORK: update href to your forked repo URL, or remove this attribution entirely -->
    <a class="footer-oss" href="https://github.com/tomlazay/portfolio-jobs" target="_blank" rel="noopener noreferrer">Open source</a>
  </div>
</footer>

<script src="js/app.js"></script>

</body>
</html>
