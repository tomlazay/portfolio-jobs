<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ── Primary SEO ───────────────────────────────────────── -->
  <!-- FORK: update the title, description, and canonical URL for your firm.
       Or set siteTitle / heroHeadline / heroSubtext in your Google Sheet config tab
       and they will override these values at runtime (title excluded — update manually). -->
  <title>Portfolio Careers | Your Firm</title>
  <meta name="description" content="Explore open roles across our portfolio of companies. Find your next opportunity here.">
  <meta name="robots" content="index, follow">
  <!-- FORK: update to your deployed domain -->
  <link rel="canonical" href="https://your-domain.vercel.app">

  <!-- ── Open Graph (LinkedIn, Facebook, Slack, iMessage…) ── -->
  <!-- FORK: update all og: URLs and content values to your firm -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://your-domain.vercel.app">
  <meta property="og:site_name"   content="Your Firm">
  <meta property="og:title"       content="Portfolio Careers | Your Firm">
  <meta property="og:description" content="Explore open roles across our portfolio of companies. Find your next opportunity here.">
  <!-- FORK: replace with your logo path — must be an absolute URL -->
  <meta property="og:image"       content="https://your-domain.vercel.app/logo.svg">

  <!-- ── X / Twitter Card ─────────────────────────────────── -->
  <!-- FORK: update twitter:site to your firm's handle (or remove the tag) -->
  <meta name="twitter:card"        content="summary">
  <meta name="twitter:site"        content="@yourfirmhandle">
  <meta name="twitter:title"       content="Portfolio Careers | Your Firm">
  <meta name="twitter:description" content="Explore open roles across our portfolio of companies. Find your next opportunity here.">
  <meta name="twitter:image"       content="https://your-domain.vercel.app/logo.svg">

  <!-- FORK: replace favicon.ico / favicon.png with your own icons -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-brand">
    <!-- FORK: replace logo.svg with your firm's logo file and update the src/alt below.
         The filename must also be updated in any og:image / twitter:image meta tags above. -->
    <img src="logo.svg" alt="Your Firm" class="hero-logo">
  </div>
  <!-- FORK: update hero text below, or set "heroHeadline" / "heroSubtext" in your Google Sheet config tab
       to override these at runtime without editing code. -->
  <h1 id="hero-headline">Jobs in Our <span>Portfolio</span></h1>
  <p id="hero-subtext">Explore open roles across our portfolio companies</p>
  <div class="hero-stats">
    <div class="hero-stat">
      <div class="hero-stat-num" id="company-count">—</div>
      <div class="hero-stat-label">Companies</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-num" id="total-count">—</div>
      <div class="hero-stat-label">Open Roles</div>
    </div>
  </div>
</div>

<!-- SEARCH & FILTERS -->
<div class="controls">
  <div class="search-bar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="search-input" placeholder="Search by job title, company, or keyword…">
    <span class="search-count" id="search-count"></span>
  </div>
  <div class="filters">
    <select class="filter-select" id="filter-company">
      <option value="">All Companies</option>
    </select>
    <select class="filter-select" id="filter-dept">
      <option value="">All Departments</option>
    </select>
    <select class="filter-select" id="filter-location">
      <option value="">All Locations</option>
    </select>
    <select class="filter-select" id="filter-type">
      <option value="">All Types</option>
    </select>
    <button class="clear-btn" onclick="clearFilters()">Clear filters</button>
  </div>
</div>

<!-- JOB LIST -->
<div class="main">
  <div class="results-header">
    <span class="results-label">Showing <strong id="visible-count">—</strong> open positions</span>
  </div>

  <!-- Loading state -->
  <div class="loading-state" id="loading-state">
    <div class="loading-spinner"></div>
    <span>Loading latest jobs…</span>
  </div>

  <div class="jobs-list" id="jobs-list"></div>

  <div class="no-results" id="no-results" style="display:none">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    No jobs match your search. Try adjusting your filters.
  </div>
</div>

<!-- FOOTER -->
<footer class="site-footer">
  <div class="site-footer-inner">
    <!-- FORK: update this copyright line, or set "footerText" in your Google Sheet config tab
         to override it at runtime without editing code. -->
    <span class="footer-copy" id="footer-copy">© 2026 Your Firm</span>
    <span class="footer-divider">·</span>
    <span class="footer-updated">Last Updated: <span id="last-updated">—</span></span>
  </div>
</footer>

<script src="js/app.js"></script>

</body>
</html>
