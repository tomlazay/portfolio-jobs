<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Careers | CompanyOn Ventures</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-brand">
    <div class="hero-brand-dot"></div>
    CompanyOn Ventures
  </div>
  <h1>Jobs in Our <span>Portfolio</span></h1>
  <p>Explore open roles across our portfolio companies</p>
  <div class="hero-stats">
    <div class="hero-stat">
      <div class="hero-stat-num">3</div>
      <div class="hero-stat-label">Companies</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-num" id="total-count">29</div>
      <div class="hero-stat-label">Open Roles</div>
    </div>
  </div>
</div>

<!-- SEARCH & FILTERS -->
<div class="controls">
  <div class="search-bar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="search-input" placeholder="Search by job title, company, or keyword…">
    <span class="search-count" id="search-count">29 jobs</span>
  </div>
  <div class="filters">
    <select class="filter-select" id="filter-company">
      <option value="">All Companies</option>
      <option value="POSH">POSH</option>
      <option value="North">North</option>
      <option value="Sent">Sent</option>
    </select>
    <select class="filter-select" id="filter-dept">
      <option value="">All Departments</option>
      <option value="Admin">Admin</option>
      <option value="Community">Community</option>
      <option value="Data & Analytics">Data & Analytics</option>
      <option value="Engineering">Engineering</option>
      <option value="GTM">GTM</option>
      <option value="Marketing">Marketing</option>
      <option value="Partnerships">Partnerships</option>
      <option value="Product & Design">Product & Design</option>
      <option value="Sales">Sales</option>
    </select>
    <select class="filter-select" id="filter-location">
      <option value="">All Locations</option>
      <option value="New York">New York</option>
      <option value="Brooklyn">Brooklyn</option>
      <option value="Remote">Remote</option>
    </select>
    <select class="filter-select" id="filter-type">
      <option value="">All Types</option>
      <option value="Full time">Full Time</option>
      <option value="Full-time">Full Time (alt)</option>
      <option value="Part-time">Part Time</option>
      <option value="Contract">Contract</option>
    </select>
    <button class="clear-btn" onclick="clearFilters()">Clear filters</button>
  </div>
</div>

<!-- JOB LIST -->
<div class="main">
  <div class="results-header">
    <span class="results-label">Showing <strong id="visible-count">29</strong> open positions</span>
  </div>
  <div class="jobs-list" id="jobs-list"></div>
  <div class="no-results" id="no-results">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    No jobs match your search. Try adjusting your filters.
  </div>
</div>

<!-- Load job data, then the app logic -->
<script src="js/jobs.js"></script>
<script src="js/app.js"></script>

</body>
</html>
